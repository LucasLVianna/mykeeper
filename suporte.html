<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte - MyKeeper</title>
</head>
<body>
    <h1>Suporte (CRUD)</h1>

    <section>
        <h2>Cadastro de Suporte</h2>
        <form id="formSuporte">
            <input type="hidden" name="id" id="suporteId">

            <label>Nome:</label><br>
            <input type="text" name="nome" id="nome" required minlength="3"><br><br>

            <label>Email:</label><br>
            <input type="email" name="email" id="email" required><br><br>

            <label>Senha:</label><br>
            <input type="password" name="senha" id="senha" required minlength="6"><br><br>

            <button type="submit" id="botaoEnviar">Cadastrar</button>
            <button type="button" id="botaoCancelar">Cancelar</button>
        </form>
    </section>

    <section>
        <h2>Lista de Suporte</h2>
        <button id="btnRecarregar">Recarregar lista</button>
        <table border="1" cellspacing="0" cellpadding="6" style="margin-top:10px;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaSuporte"></tbody>
        </table>
        <p id="mensagem"></p>
    </section>

<script>
const endpointListar = 'php/suporte_get.php';
const endpointNovo = 'php/suporte_novo.php';
const endpointAlterar = 'php/suporte_alterar.php';
const endpointExcluir = 'php/suporte_excluir.php';

const tabela = document.getElementById('tabelaSuporte');
const mensagem = document.getElementById('mensagem');
const form = document.getElementById('formSuporte');
const botaoEnviar = document.getElementById('botaoEnviar');
const botaoCancelar = document.getElementById('botaoCancelar');

function exibirMensagem(texto, tipo = 'info') {
    mensagem.textContent = texto;
    mensagem.style.color = tipo === 'erro' ? 'red' : 'green';
}

function limparFormulario() {
    form.reset();
    document.getElementById('suporteId').value = '';
    botaoEnviar.textContent = 'Cadastrar';
}

async function carregarSuportes() {
    tabela.innerHTML = '';
    exibirMensagem('Carregando...');

    const res = await fetch(endpointListar);
    const data = await res.json();

    if (data.status !== 'ok') {
        exibirMensagem(data.mensagem || 'Erro ao obter lista.', 'erro');
        return;
    }

    if (data.data.length === 0) {
        tabela.innerHTML = '<tr><td colspan="4">Nenhum suporte encontrado.</td></tr>';
        exibirMensagem('Nenhum registro encontrado.');
        return;
    }

    for (const item of data.data) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.nome}</td>
            <td>${item.email}</td>
            <td>
                <button data-action="editar" data-id="${item.id}" data-nome="${item.nome}" data-email="${item.email}">Editar</button>
                <button data-action="excluir" data-id="${item.id}">Excluir</button>
            </td>
        `;
        tabela.appendChild(tr);
    }

    exibirMensagem('Lista carregada com sucesso.');
}

async function enviarFormulario(event) {
    event.preventDefault();

    const id = document.getElementById('suporteId').value.trim();
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    if (!nome || !email || !senha) {
        exibirMensagem('Preencha todos os campos.', 'erro');
        return;
    }

    const formData = new FormData();
    formData.append('nome', nome);
    formData.append('email', email);
    formData.append('senha', senha);

    const url = id ? `${endpointAlterar}?id=${encodeURIComponent(id)}` : endpointNovo;
    const response = await fetch(url, { method: 'POST', body: formData });
    const result = await response.json();

    if (result.status === 'ok') {
        exibirMensagem(result.mensagem || 'Operação realizada com sucesso.');
        limparFormulario();
        carregarSuportes();
    } else {
        exibirMensagem(result.mensagem || 'Erro na operação.', 'erro');
    }
}

async function excluirSuporte(id) {
    if (!confirm('Deseja realmente excluir este suporte?')) return;

    const response = await fetch(`${endpointExcluir}?id=${encodeURIComponent(id)}`);
    const result = await response.json();

    if (result.status === 'ok') {
        exibirMensagem(result.mensagem || 'Registro excluído.');
        carregarSuportes();
    } else {
        exibirMensagem(result.mensagem || 'Erro ao excluir.', 'erro');
    }
}

tabela.addEventListener('click', (event) => {
    const target = event.target;
    if (target.tagName !== 'BUTTON') return;

    const action = target.dataset.action;
    const id = target.dataset.id;

    if (action === 'editar') {
        document.getElementById('suporteId').value = id;
        document.getElementById('nome').value = target.dataset.nome;
        document.getElementById('email').value = target.dataset.email;
        botaoEnviar.textContent = 'Salvar alterações';
        exibirMensagem('Modo edição ativado, altere os dados e envie.');
    }

    if (action === 'excluir') {
        excluirSuporte(id);
    }
});

form.addEventListener('submit', enviarFormulario);
botaoCancelar.addEventListener('click', limparFormulario);

document.getElementById('btnRecarregar').addEventListener('click', carregarSuportes);

carregarSuportes();
</script>
</body>
</html>
